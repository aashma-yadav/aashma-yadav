<svg width="420" height="220" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-dsa-viz" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#120B2E"/>
    </linearGradient>
    <linearGradient id="acc-dsa-viz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F6FF"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>
    <filter id="blur-dsa-viz" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow-dsa-viz" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-dsa-viz"><rect x="0" y="0" width="420" height="220" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#clip-dsa-viz)">
    <rect width="420" height="220" fill="url(#bg-dsa-viz)"/>
    <circle cx="420" cy="0" r="120" fill="#00F6FF" opacity="0.25" filter="url(#blur-dsa-viz)"/>
    <circle cx="0" cy="220" r="110" fill="#FFE066" opacity="0.22" filter="url(#blur-dsa-viz)"/>

    <!-- glass panel -->
    <rect x="14" y="14" width="392" height="192" rx="14"
          fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>

    <rect x="14" y="14" width="4" height="192" fill="url(#acc-dsa-viz)"/>

    <text x="34" y="46" font-family="'Courier New', monospace" font-size="12" letter-spacing="3" fill="#00F6FF" filter="url(#glow-dsa-viz)">FULL-STACK · ALGORITHMS</text>
    <text x="34" y="76" font-family="'Courier New', monospace" font-weight="700" font-size="23" fill="#EAF2FF">Pattern Search Visualiser</text>
    <text x="34" y="98" font-family="'Courier New', monospace" font-size="12.5" fill="#93A6CC">4 string-matching algorithms, head to head</text>

    <circle cx="34" cy="114" r="2.6" fill="#00F6FF"/><text x="46" y="118" font-family="'Courier New', monospace" font-size="12.5" fill="#C7D4F0">KMP · Automaton · Suffix Trie · Ukkonen</text>
    <circle cx="34" cy="134" r="2.6" fill="#00F6FF"/><text x="46" y="138" font-family="'Courier New', monospace" font-size="12.5" fill="#C7D4F0">Benchmarked on 325K-char corpus live</text>
    <circle cx="34" cy="154" r="2.6" fill="#00F6FF"/><text x="46" y="158" font-family="'Courier New', monospace" font-size="12.5" fill="#C7D4F0">React dashboard: time &amp; complexity tradeoffs</text>

    <text x="34" y="196" font-family="'Courier New', monospace" font-size="11.5" fill="#FFE066">C++ · Node.js · React</text>
  </g>
  <rect x="1" y="1" width="418" height="218" rx="18" fill="none" stroke="url(#acc-dsa-viz)" stroke-width="1.5" opacity="0.65"/>
</svg>
