<svg width="420" height="220" viewBox="0 0 420 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-jarvis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27"/>
      <stop offset="100%" stop-color="#120B2E"/>
    </linearGradient>
    <linearGradient id="acc-jarvis" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B2FFF"/>
      <stop offset="100%" stop-color="#00F6FF"/>
    </linearGradient>
    <filter id="blur-jarvis" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow-jarvis" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-jarvis"><rect x="0" y="0" width="420" height="220" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#clip-jarvis)">
    <rect width="420" height="220" fill="url(#bg-jarvis)"/>
    <circle cx="420" cy="0" r="120" fill="#7B2FFF" opacity="0.25" filter="url(#blur-jarvis)"/>
    <circle cx="0" cy="220" r="110" fill="#00F6FF" opacity="0.22" filter="url(#blur-jarvis)"/>

    <!-- glass panel -->
    <rect x="14" y="14" width="392" height="192" rx="14"
          fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1"/>

    <rect x="14" y="14" width="4" height="192" fill="url(#acc-jarvis)"/>

    <text x="34" y="46" font-family="'Courier New', monospace" font-size="12" letter-spacing="3" fill="#7B2FFF" filter="url(#glow-jarvis)">LLM · VOICE ASSISTANT</text>
    <text x="34" y="76" font-family="'Courier New', monospace" font-weight="700" font-size="23" fill="#EAF2FF">JARVIS</text>
    <text x="34" y="98" font-family="'Courier New', monospace" font-size="12.5" fill="#93A6CC">Fully local AI voice assistant</text>

    <circle cx="34" cy="114" r="2.6" fill="#00F6FF"/><text x="46" y="118" font-family="'Courier New', monospace" font-size="12.5" fill="#C7D4F0">Event-driven, multi-threaded pipeline</text>
    <circle cx="34" cy="134" r="2.6" fill="#00F6FF"/><text x="46" y="138" font-family="'Courier New', monospace" font-size="12.5" fill="#C7D4F0">100+ built-in actions, NLP fallback</text>
    <circle cx="34" cy="154" r="2.6" fill="#00F6FF"/><text x="46" y="158" font-family="'Courier New', monospace" font-size="12.5" fill="#C7D4F0">Zero-latency UI via producer-consumer I/O</text>

    <text x="34" y="196" font-family="'Courier New', monospace" font-size="11.5" fill="#00F6FF">Python · Ollama REST API</text>
  </g>
  <rect x="1" y="1" width="418" height="218" rx="18" fill="none" stroke="url(#acc-jarvis)" stroke-width="1.5" opacity="0.65"/>
</svg>
